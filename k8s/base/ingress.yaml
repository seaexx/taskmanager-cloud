apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskmanager-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: HOSTNAME_PLACEHOLDER
    http:
      paths:
      - pathType: Prefix
        path: /api
        backend:
          service:
            name: backend
            port: 
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80