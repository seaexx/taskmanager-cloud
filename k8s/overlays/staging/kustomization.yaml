apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Use base configuration
resources:
- namespace.yaml
- ../../base

# Deploy to staging namespace
namespace: staging

# Add -staging suffix to all resources
nameSuffix: -staging

# Add common labels to everything
commonLabels:
  environment: staging
  app.kubernetes.io/managed-by: kustomize

# Override ConfigMap for staging
configMapGenerator:
- name: backend-config
  behavior: merge
  literals:
  - DB_HOST=postgres-staging 
  - REDIS_HOST=redis-staging 
  - LOG_LEVEL=debug   

- name: postgres-config
  behavior: merge
  literals:
  - POSTGRES_DB=taskdb-staging


# Override Secret for staging
secretGenerator:
- name: backend-secret
  behavior: merge
  literals:
  - DB_PASSWORD=staging_password123 

- name: postgres-secret
  behavior: merge
  literals:
  - POSTGRES_PASSWORD=staging_dbpassword123



# Set resource limits (lower for staging)
patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 50m
  target:
    kind: Deployment
    name: backend

# Backend replicas
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: backend

# Frontend replicas  
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: frontend

# Override HPA for staging (lower max)
- patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 2
    - op: replace
      path: /spec/maxReplicas
      value: 5
  target:
    kind: HorizontalPodAutoscaler
    name: backend-hpa
