apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskmanager-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: staging.138.197.232.220.nip.io
    http:
      paths:
      - pathType: Prefix
        path: /api
        backend:
          service:
            name: backend-staging
            port: 
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-staging
            port:
              number: 80