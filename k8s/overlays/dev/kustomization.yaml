apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Use base configuration
resources:
- namespace.yaml
- ../../base

# Deploy to dev namespace
namespace: dev

# Add -dev suffix to all resources
nameSuffix: -dev

# Add common labels to everything
commonLabels:
  environment: dev
  app.kubernetes.io/managed-by: kustomize

# Override ConfigMap for dev
configMapGenerator:
- name: backend-config
  behavior: merge
  literals:
  - DB_NAME=taskdb-dev
  - DB_HOST=postgres-dev  
  - REDIS_HOST=redis-dev  
  - LOG_LEVEL=debug   

- name: frontend-config
  behavior: merge
  literals:
  - API_URL=http://backend-dev:3000

- name: postgres-config
  behavior: merge
  literals:
  - POSTGRES_DB=taskdb-dev


# Override Secret for dev
secretGenerator:
- name: backend-secret
  behavior: merge
  literals:
  - DB_PASSWORD=devdbpassword123 

- name: postgres-secret
  behavior: merge
  literals:
  - POSTGRES_PASSWORD=devdbpassword123

# Set resource limits (lower for dev)
patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 50m
  target:
    kind: Deployment
    name: backend

- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 100m
  target:
    kind: Deployment
    name: postgres

# Backend replicas
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: backend

# Frontend replicas  
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: frontend

# Override HPA for dev (lower max)
- patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 1
    - op: replace
      path: /spec/maxReplicas
      value: 3
  target:
    kind: HorizontalPodAutoscaler
    name: backend-hpa

patchesStrategicMerge:
  - ingress-patch.yaml